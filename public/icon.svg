<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#131c28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#39bae6"/>
      <stop offset="100%" stop-color="#2a8ab8"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#39bae6" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Circuit traces (behind chip) -->
  <g fill="none" stroke="#1a3a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left traces -->
    <path d="M 64,200 H 140"/>
    <path d="M 64,256 H 140"/>
    <path d="M 64,312 H 140"/>
    <!-- Right traces -->
    <path d="M 372,200 H 448"/>
    <path d="M 372,256 H 448"/>
    <path d="M 372,312 H 448"/>
    <!-- Top traces -->
    <path d="M 216,100 V 156"/>
    <path d="M 256,72 V 156"/>
    <path d="M 296,100 V 156"/>
    <!-- Bottom traces -->
    <path d="M 216,356 V 420"/>
    <path d="M 256,356 V 440"/>
    <path d="M 296,356 V 420"/>
  </g>

  <!-- Active traces (animated signal paths) -->
  <g fill="none" stroke="#7fd962" stroke-width="2.5" stroke-linecap="round" filter="url(#neon)" opacity="0.9">
    <path d="M 64,256 H 140"/>
    <path d="M 372,256 H 448"/>
    <path d="M 256,72 V 156"/>
    <path d="M 256,356 V 440"/>
  </g>

  <!-- Main chip body -->
  <rect x="140" y="156" width="232" height="200" rx="12" fill="url(#chip)" stroke="#1e2a3a" stroke-width="2"/>

  <!-- Chip inner border glow -->
  <rect x="140" y="156" width="232" height="200" rx="12" fill="none" stroke="#39bae6" stroke-width="1" opacity="0.3"/>

  <!-- Pin dots — left -->
  <circle cx="140" cy="200" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <circle cx="140" cy="256" r="6" fill="#131c28" stroke="#7fd962" stroke-width="2"/>
  <circle cx="140" cy="312" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <!-- Pin dots — right -->
  <circle cx="372" cy="200" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <circle cx="372" cy="256" r="6" fill="#131c28" stroke="#7fd962" stroke-width="2"/>
  <circle cx="372" cy="312" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <!-- Pin dots — top -->
  <circle cx="216" cy="156" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <circle cx="256" cy="156" r="6" fill="#131c28" stroke="#7fd962" stroke-width="2"/>
  <circle cx="296" cy="156" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <!-- Pin dots — bottom -->
  <circle cx="216" cy="356" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>
  <circle cx="256" cy="356" r="6" fill="#131c28" stroke="#7fd962" stroke-width="2"/>
  <circle cx="296" cy="356" r="6" fill="#131c28" stroke="#39bae6" stroke-width="2"/>

  <!-- Chip text: "Si" (Silicon element symbol) -->
  <text x="256" y="232" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="url(#glow)" filter="url(#neonStrong)"><tspan>S</tspan><tspan font-size="48" dy="2">i</tspan></text>

  <!-- Chip subtitle -->
  <text x="256" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#6c7a8a" letter-spacing="6">SYN</text>

  <!-- Active signal dots (green pulses at key junctions) -->
  <circle cx="64" cy="256" r="4" fill="#7fd962" filter="url(#neon)"/>
  <circle cx="448" cy="256" r="4" fill="#7fd962" filter="url(#neon)"/>
  <circle cx="256" cy="72" r="4" fill="#7fd962" filter="url(#neon)"/>
  <circle cx="256" cy="440" r="4" fill="#7fd962" filter="url(#neon)"/>
</svg>
