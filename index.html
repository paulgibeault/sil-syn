<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Silicon Syndicate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080c10;
      --board: #0d1117;
      --panel: #131820;
      --border: #1e2a3a;
      --trace: #1a3a2a;
      --text: #c5cdd8;
      --dim: #5c6773;
      --accent: #39bae6;
      --green: #7fd962;
      --red: #f07178;
      --yellow: #e6b450;
      --cyan: #5ccfe6;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overflow-y: auto;
      overflow-x: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #btn-help {
      background: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-family: var(--font);
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    /* --- Level Map (replaces dropdown) --- */
    #level-map {
      display: flex;
      gap: 0;
      padding: 10px 16px;
      background: var(--board);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      align-items: center;
    }
    .level-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .level-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--dim);
      background: var(--panel);
      transition: all 0.2s;
    }
    .level-dot.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1a2a3a;
      box-shadow: 0 0 8px rgba(57, 186, 230, 0.3);
    }
    .level-dot.passed {
      border-color: var(--green);
      color: var(--green);
      background: #1a3320;
    }
    .level-wire {
      width: 20px;
      height: 2px;
      background: var(--border);
      flex-shrink: 0;
    }
    .level-wire.passed { background: var(--green); }
    .level-label {
      font-size: 9px;
      color: var(--dim);
      margin-top: 4px;
      text-align: center;
      max-width: 48px;
      line-height: 1.2;
    }
    .level-node.active .level-label { color: var(--accent); }

    /* --- Mission briefing --- */
    #mission {
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #mission-title {
      color: var(--yellow);
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #mission-desc {
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
    }

    /* --- Circuit board --- */
    #circuit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 12px 16px;
      background: var(--board);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 64px;
    }
    .circuit-component {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      text-align: center;
      min-width: 72px;
      position: relative;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .circuit-component.input-comp {
      border-color: var(--cyan);
    }
    .circuit-component.output-comp {
      border-color: #333;
    }
    .circuit-component.output-comp.lit {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(127, 217, 98, 0.4);
    }
    .circuit-component.mcu-comp {
      border-color: var(--accent);
      background: #0d1a28;
    }
    .comp-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 4px;
    }
    .comp-icon {
      font-size: 20px;
      line-height: 1;
      margin-bottom: 2px;
      transition: opacity 0.3s;
    }
    .comp-icon.off { opacity: 0.2; }
    .comp-icon.on { opacity: 1.0; }
    .comp-icon.dim { opacity: 0.5; }
    .comp-value {
      font-size: 12px;
      font-weight: bold;
      min-width: 32px;
    }
    .comp-value.on { color: var(--green); }
    .comp-value.off { color: var(--dim); }
    .comp-target {
      font-size: 9px;
      color: var(--yellow);
      margin-top: 2px;
    }
    .comp-pin-label {
      font-size: 8px;
      color: var(--accent);
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .circuit-wire {
      width: 28px;
      height: 2px;
      background: var(--trace);
      flex-shrink: 0;
      position: relative;
      transition: background 0.3s;
    }
    .circuit-wire::after {
      content: '';
      position: absolute;
      right: -3px;
      top: -3px;
      width: 0; height: 0;
      border-left: 6px solid var(--trace);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      transition: border-left-color 0.3s;
    }
    .circuit-wire.active {
      background: var(--green);
    }
    .circuit-wire.active::after {
      border-left-color: var(--green);
    }
    .wire-value {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--green);
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .circuit-wire.active .wire-value {
      opacity: 1;
    }

    /* --- Visual builder --- */
    .builder {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 8px 12px;
    }
    .builder-slots {
      flex: 1;
      overflow-y: auto;
    }
    .slot-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      border-bottom: 1px solid #0a0e14;
      min-height: 36px;
    }
    .slot-row.empty { opacity: 0.3; }
    .slot-row.locked { opacity: 0.85; }
    .cell-locked {
      cursor: default !important;
      opacity: 0.8;
    }
    .blank-arg {
      animation: pulse-blank 1.5s ease-in-out infinite;
      border-color: var(--yellow) !important;
      color: var(--yellow) !important;
    }
    @keyframes pulse-blank {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230, 180, 80, 0); }
      50% { box-shadow: 0 0 8px 2px rgba(230, 180, 80, 0.3); }
    }
    .slot-row.highlight {
      background: rgba(57, 186, 230, 0.08);
      border-color: var(--accent);
    }
    .slot-num {
      font-size: 10px;
      color: var(--dim);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }
    .slot-cond {
      width: 20px;
      height: 24px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot-cond.cond-plus { color: var(--green); border-color: var(--green); }
    .slot-cond.cond-minus { color: var(--red); border-color: var(--red); }
    .slot-cell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      min-width: 48px;
      text-align: center;
    }
    .slot-cell:active { background: var(--border); }
    .slot-op {
      color: var(--accent);
      font-weight: bold;
      min-width: 42px;
    }
    .slot-arg { color: var(--green); }
    .slot-cell.placeholder {
      color: var(--dim);
      border-style: dashed;
    }
    .slot-label-badge {
      font-size: 10px;
      color: var(--yellow);
      margin-left: auto;
      padding: 2px 6px;
      background: rgba(230, 180, 80, 0.1);
      border-radius: 3px;
    }
    .builder-toggle {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      padding: 6px;
      text-align: right;
      text-decoration: underline;
    }
    .builder-textarea {
      flex: 1;
      background: var(--bg);
      color: var(--green);
      border: 1px solid var(--border);
      padding: 8px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      border-radius: 3px;
    }
    .builder-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* --- Picker overlay --- */
    .picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .picker-sheet {
      background: var(--panel);
      border-top: 2px solid var(--accent);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 60dvh;
      overflow-y: auto;
      padding: 12px;
    }
    .picker-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 8px;
      text-align: center;
    }
    .picker-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .picker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: var(--font);
      cursor: pointer;
      text-align: left;
      color: var(--text);
    }
    .picker-item:active { background: var(--border); }
    .picker-item-label {
      color: var(--accent);
      font-weight: bold;
      font-size: 14px;
      min-width: 36px;
    }
    .picker-item-desc {
      color: var(--dim);
      font-size: 12px;
    }
    .picker-clear {
      border-color: var(--red) !important;
    }
    .picker-clear .picker-item-label { color: var(--red); }

    /* Number pad */
    .numpad-sheet { text-align: center; }
    .numpad-display {
      font-size: 24px;
      color: var(--green);
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .numpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .numpad-key {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: var(--font);
      font-size: 18px;
      color: var(--text);
      cursor: pointer;
    }
    .numpad-key:active { background: var(--border); }
    .numpad-ok {
      background: #1a3320;
      border-color: var(--green);
      color: var(--green);
    }
    .numpad-clear {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      padding: 8px;
      margin-top: 4px;
    }

    /* --- Controls --- */
    #controls {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
      align-items: center;
    }
    #controls button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-family: var(--font);
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      min-width: 56px;
    }
    #controls button:active { background: var(--border); }
    .btn-run { border-color: var(--green) !important; color: var(--green) !important; }
    .btn-stop { border-color: var(--red) !important; color: var(--red) !important; }
    #cycle-display {
      margin-left: auto;
      color: var(--dim);
      font-size: 12px;
    }

    /* --- Registers --- */
    #registers {
      display: flex;
      gap: 12px;
      padding: 6px 16px;
      background: var(--board);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
    }
    .reg {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .reg-name {
      color: var(--dim);
      text-transform: uppercase;
    }
    .reg-val {
      color: var(--accent);
      font-weight: bold;
    }
    .reg-val.changed { color: var(--yellow); }

    /* --- Waveform --- */
    #waveform-section {
      flex-shrink: 0;
      padding: 8px 16px;
      overflow-x: auto;
      border-top: 1px solid var(--border);
    }
    #wave-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 4px;
    }
    #waveform {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 60px;
    }
    .wave-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 20px;
    }
    .wave-bar {
      width: 16px;
      border-radius: 2px 2px 0 0;
    }
    .wave-bar.pass { background: var(--green); }
    .wave-bar.fail { background: var(--red); }
    .wave-bar.expected {
      background: none;
      border: 1px dashed var(--dim);
      border-bottom: none;
      opacity: 0.5;
    }
    .wave-label {
      font-size: 8px;
      color: var(--dim);
      margin-top: 2px;
    }

    /* --- Result banner --- */
    #result-banner {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
      display: none;
      letter-spacing: 2px;
    }
    #result-banner.pass {
      display: block;
      background: #1a3320;
      color: var(--green);
      border-top: 2px solid var(--green);
    }
    #result-banner.fail {
      display: block;
      background: #331a1a;
      color: var(--red);
      border-top: 2px solid var(--red);
    }

    /* --- Error display --- */
    #code-error {
      font-size: 12px;
      color: var(--red);
      padding: 4px 16px;
      display: none;
      flex-shrink: 0;
    }

    /* --- Guide overlay --- */
    .guide-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
    }
    .guide-spotlight {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
      z-index: 201;
    }
    .guide-tooltip {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 14px 16px;
      max-width: 280px;
      z-index: 202;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .guide-text {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .guide-text strong { color: var(--yellow); }
    .guide-text code {
      background: var(--bg);
      color: var(--green);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 12px;
    }
    .guide-dismiss {
      background: var(--bg);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 16px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    .guide-dismiss:active { background: var(--border); }

    /* --- Tutorial overlay (reference) --- */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
    }
    #tutorial-overlay.visible {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tutorial-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 6px;
      max-width: 480px;
      width: 90%;
      max-height: 85dvh;
      overflow-y: auto;
      padding: 20px;
    }
    #tutorial-card h2 {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #tutorial-card h3 {
      color: var(--yellow);
      font-size: 12px;
      margin-top: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #tutorial-card p, #tutorial-card li {
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    #tutorial-card ul { padding-left: 16px; margin-bottom: 6px; }
    #tutorial-card code {
      background: var(--bg);
      color: var(--green);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 11px;
    }
    #tutorial-card pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px;
      margin: 6px 0;
      color: var(--green);
      font-size: 11px;
      line-height: 1.5;
      overflow-x: auto;
    }
    .tutorial-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .tutorial-nav button {
      background: var(--bg);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 6px 16px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .tutorial-nav button:disabled { opacity: 0.3; cursor: default; }
    .tutorial-dots { display: flex; gap: 6px; }
    .tutorial-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
    }
    .tutorial-dot.active { background: var(--accent); }

    /* --- Landscape --- */
    @media (min-width: 700px) {
      #game-area {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      #left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        min-height: 0;
      }
      #right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
    }
    @media (max-width: 699px) {
      #game-area {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      #left-panel, #right-panel {
        display: flex;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Silicon Syndicate</h1>
    <div class="header-right">
      <button id="btn-help" title="Reference Guide">?</button>
    </div>
  </header>

  <!-- Level map -->
  <div id="level-map"></div>

  <!-- Mission briefing -->
  <div id="mission">
    <div id="mission-title"></div>
    <div id="mission-desc"></div>
  </div>

  <!-- Circuit board visualization -->
  <div id="circuit"></div>

  <!-- Game area -->
  <div id="game-area">
    <div id="left-panel">
      <!-- Visual builder goes here -->
      <div id="builder-container"></div>
      <div id="code-error"></div>
    </div>

    <div id="right-panel">
      <div id="controls">
        <button id="btn-run" class="btn-run">Run</button>
        <button id="btn-step">Step</button>
        <button id="btn-reset">Reset</button>
        <span id="cycle-display">Cycle: 0</span>
      </div>

      <div id="registers">
        <div class="reg"><span class="reg-name">acc</span> <span class="reg-val" id="reg-acc">0</span></div>
        <div class="reg"><span class="reg-name">dat</span> <span class="reg-val" id="reg-dat">0</span></div>
        <div class="reg"><span class="reg-name">pc</span> <span class="reg-val" id="reg-pc">0</span></div>
        <div class="reg"><span class="reg-name">state</span> <span class="reg-val" id="reg-state">RDY</span></div>
      </div>

      <div id="waveform-section">
        <div id="wave-header">Output Waveform</div>
        <div id="waveform"></div>
      </div>

      <div id="result-banner"></div>
    </div>
  </div>

  <!-- Reference guide overlay (accessible via ?) -->
  <div id="tutorial-overlay">
    <div id="tutorial-card">
      <h2 id="tutorial-title"></h2>
      <div id="tutorial-body"></div>
      <div class="tutorial-nav">
        <button id="tut-prev">Prev</button>
        <div class="tutorial-dots" id="tut-dots"></div>
        <button id="tut-next">Next</button>
      </div>
