<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Silicon Syndicate</title>
  <meta name="description" content="Program microcontrollers. Route signals. Hack the system.">
  <meta name="theme-color" content="#080c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SilSyn">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080c10;
      --board: #0d1117;
      --panel: #161d27;
      --border: #1e2a3a;
      --trace: #1a3a2a;
      --text: #d0d8e2;
      --dim: #6c7a8a;
      --accent: #39bae6;
      --green: #7fd962;
      --red: #f07178;
      --yellow: #e6b450;
      --cyan: #5ccfe6;
      --font: 'Courier New', monospace;
    }

    /* ===== LAYOUT — full-height column, board fills middle ===== */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header: compact single row --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      display: flex;
      align-items: baseline;
      gap: 2px;
      font-size: 12px;
      line-height: 1;
    }
    .logo-si {
      font-size: 20px;
      font-weight: bold;
      color: var(--accent);
    }
    .logo-syn {
      font-size: 14px;
      font-weight: bold;
      color: var(--green);
      letter-spacing: 2px;
    }
    #btn-help {
      background: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      width: 24px; height: 24px;
      border-radius: 50%;
      font-family: var(--font);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* --- Level Map: compact horizontal strip --- */
    #level-map {
      display: flex;
      padding: 4px 12px;
      background: var(--board);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      align-items: center;
    }
    .level-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .level-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: var(--dim);
      background: var(--panel);
    }
    .level-dot.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1a2a3a;
    }
    .level-dot.passed {
      border-color: var(--green);
      color: var(--green);
      background: #1a3320;
    }
    .level-wire {
      width: 10px; height: 2px;
      background: var(--border);
      flex-shrink: 0;
    }
    .level-wire.passed { background: var(--green); }
    .level-label {
      font-size: 7px;
      color: var(--dim);
      margin-top: 1px;
      text-align: center;
      max-width: 36px;
      line-height: 1;
    }
    .level-node.active .level-label { color: var(--accent); }

    /* --- Mission: single-line description --- */
    #mission {
      padding: 4px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    #mission-title {
      color: var(--yellow);
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    #mission-desc { color: var(--dim); font-size: 11px; }

    /* --- Component Tray (when level needs placement) --- */
    #component-tray {
      display: flex;
      gap: 6px;
      padding: 4px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      justify-content: center;
      flex-shrink: 0;
    }
    .tray-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tray-item:active { background: var(--border); }
    .tray-item.active { border-color: var(--accent); color: var(--accent); }
    .tray-item.placed { opacity: 0.3; pointer-events: none; }
    .tray-icon { font-size: 12px; }

    /* ===== GAME AREA — board + waveform overlay ===== */
    #game-area {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    #circuit {
      width: 100%;
      height: 100%;
      background: var(--board);
      overflow: hidden;
    }
    .circuit-board-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      gap: 4px;
    }
    .cb-grid {
      position: relative;
      background: var(--board);
      border: 1px solid var(--border);
      border-radius: 4px;
      background-image:
        linear-gradient(to right, rgba(30,42,58,0.4) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(30,42,58,0.4) 1px, transparent 1px);
      overflow: visible;
    }
    .cb-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 1;
    }
    .cb-svg .cb-wire-hit {
      pointer-events: stroke;
      fill: none;
      stroke: transparent;
      stroke-width: 16;
      cursor: pointer;
    }
    .cb-svg .cb-wire {
      fill: none;
      stroke: var(--trace);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.3s;
    }
    .cb-svg .cb-wire.active {
      stroke: var(--green);
      filter: drop-shadow(0 0 4px rgba(127,217,98,0.4));
    }
    .cb-comp {
      position: absolute;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      z-index: 5;
      cursor: pointer;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .cb-comp.locked { cursor: default; }
    .cb-comp-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
    }
    .cb-comp-icon {
      font-size: 20px;
      line-height: 1;
      transition: color 0.3s, opacity 0.3s, text-shadow 0.3s;
    }
    .cb-comp-value {
      font-size: 11px;
      color: var(--text);
      font-weight: bold;
    }
    .cb-pin {
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--panel);
      border: 2px solid var(--dim);
      z-index: 10;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .cb-pin-out { border-color: var(--green); }
    .cb-pin-in { border-color: var(--accent); }
    .cb-pin.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(57,186,230,0.5);
    }
    .cb-pin.compatible { animation: pin-pulse 1s ease-in-out infinite; }
    @keyframes pin-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(57,186,230,0); }
      50% { box-shadow: 0 0 8px 3px rgba(57,186,230,0.4); }
    }
    .cb-pin-label {
      position: absolute;
      font-size: 8px;
      color: var(--dim);
      white-space: nowrap;
      pointer-events: none;
    }
    .cb-ghost {
      position: absolute;
      border: 2px dashed var(--accent);
      border-radius: 6px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--accent);
      text-transform: uppercase;
    }
    .cb-status {
      font-size: 11px;
      color: var(--yellow);
      text-align: center;
      min-height: 16px;
    }

    /* ===== BOTTOM BAR — controls only, always at very bottom ===== */
    #bottom-bar {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    #controls {
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      align-items: center;
    }
    #controls button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    #controls button:active { background: var(--border); }
    .btn-run { border-color: var(--green) !important; color: var(--green) !important; }
    .btn-stop { border-color: var(--red) !important; color: var(--red) !important; }
    #cycle-display { color: var(--dim); font-size: 11px; }
    #registers {
      display: flex;
      gap: 10px;
      margin-left: auto;
      font-size: 10px;
    }
    .reg { display: flex; gap: 3px; align-items: center; }
    .reg-name { color: var(--dim); text-transform: uppercase; }
    .reg-val { color: var(--accent); font-weight: bold; }
    .reg-val.changed { color: var(--yellow); }
    /* --- Waveform / Signal Monitor — semi-transparent overlay on board --- */
    #waveform-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,12,16,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-top: 1px solid rgba(57,186,230,0.2);
      z-index: 15;
      pointer-events: auto;
    }
    #waveform {
      display: flex;
      flex-direction: column;
    }
    .wave-pin-section {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid rgba(30,42,58,0.3);
    }
    .wave-pin-section:last-child { border-bottom: none; }
    .wave-pin-label {
      width: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      border-right: 1px solid rgba(57,186,230,0.15);
    }
    .wave-track {
      flex: 1;
      display: flex;
      align-items: flex-end;
      min-height: 0;
      padding: 4px 4px 0;
    }
    .wave-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-width: 0;
      position: relative;
    }
    .wave-bar-wrap {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 48px;
      position: relative;
    }
    .wave-bar {
      width: 60%;
      max-width: 28px;
      min-width: 4px;
      border-radius: 2px 2px 0 0;
      transition: height 0.2s ease, background 0.2s ease;
    }
    .wave-bar.pass {
      background: linear-gradient(to top, var(--green), rgba(127,217,98,0.5));
      box-shadow: 0 0 8px rgba(127,217,98,0.3);
    }
    .wave-bar.fail {
      background: linear-gradient(to top, var(--red), rgba(240,113,120,0.5));
      box-shadow: 0 0 8px rgba(240,113,120,0.3);
    }
    .wave-bar.expected {
      background: none;
      border: 1px dashed rgba(108,122,138,0.6);
      border-bottom: none;
    }
    .wave-expect-marker {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 0;
      border-top: 2px dashed var(--yellow);
      opacity: 0.6;
      pointer-events: none;
    }
    .wave-label {
      font-size: 8px;
      color: rgba(108,122,138,0.7);
      padding: 2px 0 3px;
      text-align: center;
      width: 100%;
    }
    .wave-value-tip {
      position: absolute;
      top: -2px;
      font-size: 8px;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .wave-col:hover .wave-value-tip { opacity: 1; }
    #result-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      display: none;
      letter-spacing: 3px;
      border-radius: 6px;
      z-index: 20;
      pointer-events: none;
    }
    #result-banner.pass {
      display: block;
      background: rgba(26,51,32,0.9);
      color: var(--green);
      border: 1px solid var(--green);
      box-shadow: 0 0 20px rgba(127,217,98,0.3);
    }
    #result-banner.fail {
      display: block;
      background: rgba(51,26,26,0.9);
      color: var(--red);
      border: 1px solid var(--red);
      box-shadow: 0 0 20px rgba(240,113,120,0.3);
    }
    #code-error {
      font-size: 11px;
      color: var(--red);
      padding: 2px 12px;
      display: none;
    }

    /* ===== ALL OVERLAYS — consistent fixed positioning ===== */

    /* Shared overlay backdrop */
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
    }

    /* --- Builder Modal (centered floating card) --- */
    #builder-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
    }
    #builder-modal.visible { display: flex; }
    #builder-modal-sheet {
      width: 90%;
      max-width: 420px;
      max-height: 65vh;
      max-height: 65dvh;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #builder-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #builder-modal-title {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #builder-modal-close {
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    #builder-modal-close:active { background: var(--border); }
    #builder-container {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    /* --- Visual builder slots --- */
    .builder {
      display: flex;
      flex-direction: column;
      padding: 6px 10px;
    }
    .builder-slots { overflow-y: auto; }
    .slot-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      min-height: 34px;
    }
    .slot-row.empty { opacity: 0.25; }
    .slot-row.locked { opacity: 0.8; }
    .slot-row.highlight {
      background: rgba(57, 186, 230, 0.08);
      border-color: var(--accent);
    }
    .cell-locked { cursor: default !important; opacity: 0.7; }
    .blank-arg {
      animation: pulse-blank 1.5s ease-in-out infinite;
      border-color: var(--yellow) !important;
      color: var(--yellow) !important;
    }
    @keyframes pulse-blank {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230,180,80,0); }
      50% { box-shadow: 0 0 8px 2px rgba(230,180,80,0.3); }
    }
    .slot-num {
      font-size: 10px;
      color: var(--dim);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }
    .slot-cond {
      width: 20px; height: 24px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot-cond.cond-plus { color: var(--green); border-color: var(--green); }
    .slot-cond.cond-minus { color: var(--red); border-color: var(--red); }
    .slot-cell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      min-width: 46px;
      text-align: center;
    }
    .slot-cell:active { background: var(--border); }
    .slot-op { color: var(--accent); font-weight: bold; min-width: 40px; }
    .slot-arg { color: var(--green); }
    .slot-cell.placeholder { color: var(--dim); border-style: dashed; }
    .slot-label-badge {
      font-size: 10px;
      color: var(--yellow);
      margin-left: auto;
      padding: 2px 6px;
      background: rgba(230,180,80,0.1);
      border-radius: 3px;
    }
    .builder-toggle {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      padding: 6px;
      text-align: right;
      text-decoration: underline;
    }
    .builder-textarea {
      flex: 1;
      background: var(--bg);
      color: var(--green);
      border: 1px solid var(--border);
      padding: 8px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      border-radius: 3px;
      min-height: 120px;
    }
    .builder-textarea:focus { outline: none; border-color: var(--accent); }

    /* --- Picker overlay (centered floating card) --- */
    .picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .picker-sheet {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      width: 85%;
      max-width: 360px;
      max-height: 60vh;
      max-height: 60dvh;
      overflow-y: auto;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .picker-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin-bottom: 8px;
      text-align: center;
    }
    .picker-grid { display: flex; flex-direction: column; gap: 4px; }
    .picker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: var(--font);
      cursor: pointer;
      color: var(--text);
    }
    .picker-item:active { background: var(--border); }
    .picker-item-label { color: var(--accent); font-weight: bold; font-size: 14px; min-width: 36px; }
    .picker-item-desc { color: var(--dim); font-size: 12px; }
    .picker-clear { border-color: var(--red) !important; }
    .picker-clear .picker-item-label { color: var(--red); }

    /* Number pad (uses picker-sheet base, adds centered layout) */
    .numpad-sheet { text-align: center; max-width: 300px; }
    .numpad-display {
      font-size: 24px;
      color: var(--green);
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .numpad-key {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: var(--font);
      font-size: 18px;
      color: var(--text);
      cursor: pointer;
    }
    .numpad-key:active { background: var(--border); }
    .numpad-ok { background: #1a3320; border-color: var(--green); color: var(--green); }
    .numpad-clear {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      padding: 8px;
      margin-top: 4px;
    }

    /* --- Guide overlay (fixed, viewport-clamped) --- */
    .guide-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      /* No background — spotlight box-shadow handles the dimming */
    }
    .guide-spotlight {
      position: fixed;
      border: 2px solid var(--accent);
      border-radius: 8px;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.65),
        0 0 12px 2px rgba(57,186,230,0.25);
      z-index: 201;
      pointer-events: none;
    }
    .guide-tooltip {
      position: fixed;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 14px 16px;
      width: 280px;
      max-width: calc(100vw - 32px);
      z-index: 202;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .guide-text {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .guide-text strong { color: var(--yellow); }
    .guide-text code {
      background: var(--bg);
      color: var(--green);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 12px;
    }
    .guide-dismiss {
      background: var(--bg);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 16px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    .guide-dismiss:active { background: var(--border); }

    /* --- Tutorial / Reference overlay (centered card) --- */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
    }
    #tutorial-overlay.visible {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tutorial-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 6px;
      max-width: 480px;
      width: 90%;
      max-height: 80vh;
      max-height: 80dvh;
      overflow-y: auto;
      padding: 20px;
    }
    #tutorial-card h2 {
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #tutorial-card h3 {
      color: var(--yellow);
      font-size: 12px;
      margin-top: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    #tutorial-card p, #tutorial-card li {
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    #tutorial-card ul { padding-left: 16px; margin-bottom: 6px; }
    #tutorial-card code {
      background: var(--bg);
      color: var(--green);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 11px;
    }
    #tutorial-card pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px;
      margin: 6px 0;
      color: var(--green);
      font-size: 11px;
      line-height: 1.5;
      overflow-x: auto;
    }
    .tutorial-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .tutorial-nav button {
      background: var(--bg);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 6px 16px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .tutorial-nav button:disabled { opacity: 0.3; cursor: default; }
    .tutorial-dots { display: flex; gap: 6px; }
    .tutorial-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .tutorial-dot.active { background: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1><span class="logo-si">Si</span><span class="logo-syn">SYN</span></h1>
    <button id="btn-help" title="Reference Guide">?</button>
  </header>

  <div id="level-map"></div>

  <div id="mission">
    <div id="mission-title"></div>
    <div id="mission-desc"></div>
  </div>

  <div id="component-tray"></div>

  <!-- Game area: board + waveform overlay -->
  <div id="game-area">
    <div id="circuit"></div>
    <div id="waveform-section">
      <div id="waveform"></div>
    </div>
    <div id="result-banner"></div>
  </div>

  <!-- Controls bar: always at the very bottom -->
  <div id="bottom-bar">
    <div id="controls">
      <button id="btn-run" class="btn-run">Run</button>
      <button id="btn-step">Step</button>
      <button id="btn-reset">Reset</button>
      <span id="cycle-display">Cycle: 0</span>
      <div id="registers">
        <div class="reg"><span class="reg-name">acc</span> <span class="reg-val" id="reg-acc">0</span></div>
        <div class="reg"><span class="reg-name">dat</span> <span class="reg-val" id="reg-dat">0</span></div>
        <div class="reg"><span class="reg-name">pc</span> <span class="reg-val" id="reg-pc">0</span></div>
      </div>
    </div>
    <div id="code-error"></div>
  </div>

  <!-- Builder modal: fixed bottom sheet -->
  <div id="builder-modal">
    <div id="builder-modal-sheet">
      <div id="builder-modal-header">
        <span id="builder-modal-title">MCU Program</span>
        <button id="builder-modal-close">Done</button>
      </div>
      <div id="builder-container"></div>
    </div>
  </div>

  <!-- Reference guide -->
  <div id="tutorial-overlay">
    <div id="tutorial-card">
      <h2 id="tutorial-title"></h2>
      <div id="tutorial-body"></div>
      <div class="tutorial-nav">
        <button id="tut-prev">Prev</button>
        <div class="tutorial-dots" id="tut-dots"></div>
        <button id="tut-next">Next</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
